<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Fonts & Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=partner_exchange"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=payments"
    />

    <!-- Favicon / Logo -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="VRO Funeral Parlour offers compassionate funeral services, tailored plans, and professional support for families in South Africa."
    />

    <!-- Open Graph (Facebook, WhatsApp) -->
    <meta property="og:title" content="VRO Funeral Parlour" />
    <meta
      property="og:description"
      content="Compassionate funeral services, tailored plans, and professional support for families in South Africa."
    />
    <meta property="og:image" content="https://vro-funerals.co.za/logo.png" />
    <meta property="og:url" content="https://vro-funerals.co.za" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VRO Funeral Parlour" />
    <meta
      name="twitter:description"
      content="Compassionate funeral services, tailored plans, and professional support for families in South Africa."
    />
    <meta name="twitter:image" content="https://vro-funerals.co.za/logo.png" />

    <!-- Structured Data for Organization & Logo -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "VRO Funeral Parlour",
        "url": "https://vro-funerals.co.za",
        "logo": "https://vro-funerals.co.za/logo.png",
        "sameAs": [
          "https://www.facebook.com/vrofunerals",
          "https://www.instagram.com/vrofunerals"
        ]
      }
    </script>

    <title>VRO Funeral Parlour</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
